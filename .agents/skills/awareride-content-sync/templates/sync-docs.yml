# Sync product docs from an external project to the AwareRide content hub.
#
# Place at: .github/workflows/sync-docs.yml
#
# Required secret in the external repo:
#   DOCS_CENTRAL_HUB_TOKEN  - a fine-grained PAT on
#                             awareride/awareride.github.io with
#                             "Contents: write" (push the sync branch) and
#                             "Pull requests: write" (open the PR).
#
# Sync pushes to a dedicated branch (sync-docs-<repo>-<run>) and opens a
# pull request against the hub's main, so a human reviews content before it
# ships. No commit lands on main directly.
#
# Directory mapping:
#   <external>/docs/   ->  awareride.github.io/src/content/docs/${PRODUCT}/
#
# The external docs/ tree is flat by locale: docs/<locale>/<slug>.md
# (e.g. docs/en/index.md, docs/zh/index.md). The product dimension is NOT in
# the external repo - it is injected by sync from the PRODUCT env var below, so
# the hub ends up with src/content/docs/${PRODUCT}/<locale>/<slug>.md. Keeping
# the external repo flat lets relative markdown links resolve against docs/ on
# GitHub (rather than docs/<product>/).
#
# IMPORTANT: set PRODUCT (below) to a name that is listed in the hub's
# src/content.config.ts `products` array, otherwise the synced content won't
# have a collection. See SKILL.md "Registering a new product".
#
# The copy uses `rsync -a docs/ dest/` ("contents of docs/ into dest/") so the
# result is always src/content/docs/${PRODUCT}/..., never docs/docs/...
#
# Deleting retired content: the rsync copy only adds/overwrites; it never
# removes hub-only files (to protect content from other projects). To retire
# a page, delete it from docs/ here AND list it in sync-delete.list at the
# repo root (one path per line, e.g. `docs/en/old-page.md`, or
# `docs/en/legacy/` with a trailing slash to drop a whole directory).
# If that file is present, the workflow runs scripts/apply-delete-list.mjs
# after the copy to remove the listed paths from the hub. See SKILL.md
# "Deleting content".

name: Sync Docs to AwareRide Hub

on:
  push:
    branches: [main]
    paths: ['docs/**']
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout external repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate content
        run: node .agents/skills/awareride-content-sync/scripts/validate.mjs

      - name: Sync docs/ to central hub via PR
        env:
          API_TOKEN_GITHUB: ${{ secrets.DOCS_CENTRAL_HUB_TOKEN }}
          SOURCE_REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
          # Set this to your product name (must be in the hub's products[]).
          PRODUCT: packscope
        run: |
          set -euo pipefail
          # PRODUCT must be set in the env: above to a hub-registered product.
          if [ -z "${PRODUCT:-}" ]; then
            echo 'PRODUCT env var is not set. Set it in the workflow env: block.' >&2
            exit 1
          fi
          HUB=awareride/awareride.github.io
          # Source repo is owner/name; sanitize the '/' for a branch name.
          SRC=$(printf '%s' "${SOURCE_REPO}" | tr '/' '-')
          BRANCH="sync-docs-${SRC}-${RUN_ID}-${RUN_ATTEMPT}"
          CLONE_DIR=$(mktemp -d)

          git config --global user.email 'syncbot@awareride.com'
          git config --global user.name 'DocSyncBot'
          git clone --single-branch --branch main \
            "https://x-access-token:${API_TOKEN_GITHUB}@github.com/${HUB}.git" "$CLONE_DIR"

          # Copy CONTENTS of docs/ into src/content/docs/${PRODUCT}/ via rsync.
          # rsync's `docs/` source means "the contents of docs", so this never
          # nests (no docs/docs/), regardless of whether the destination dir
          # already exists on the hub. The ${PRODUCT}/ segment is created here.
          DEST="$CLONE_DIR/src/content/docs/${PRODUCT}"
          mkdir -p "$DEST"
          rsync -a docs/ "$DEST/"

          # Apply optional deletions from $GITHUB_WORKSPACE/sync-delete.list.
          # Only `docs/...` entries are processed here; `posts/...` entries are
          # handled by sync-posts.yml. Missing file = no-op. Runs after rsync so
          # deletions win over the copy. The collection dir includes ${PRODUCT},
          # so `docs/en/foo.md` -> src/content/docs/${PRODUCT}/en/foo.md.
          node .agents/skills/awareride-content-sync/scripts/apply-delete-list.mjs \
            "$DEST" docs

          cd "$CLONE_DIR"
          git checkout -b "$BRANCH"
          git add .
          if git diff --cached --quiet; then
            echo "No changes to sync."
          else
            git commit -m "docs: sync from ${SOURCE_REPO}"
            git push -u origin "$BRANCH"

            # Open a PR against the hub's main for human review.
            # `gh` is preinstalled on GitHub-hosted runners.
            export GH_TOKEN="${API_TOKEN_GITHUB}"
            PR_BODY="$(printf 'Automated sync of `docs/` from `%s`.\n\nTriggered by workflow run [#%s](https://github.com/%s/actions/runs/%s).' \
              "${SOURCE_REPO}" "${RUN_ID}" "${SOURCE_REPO}" "${RUN_ID}")"
            gh pr create --repo "${HUB}" --base main --head "${BRANCH}" \
              --title "docs: sync from ${SOURCE_REPO}" \
              --body "${PR_BODY}"
          fi
